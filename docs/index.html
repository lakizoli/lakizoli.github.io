<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZSoft Project Hub</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-color: #1d1d1f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        h1 {
            font-weight: 700;
            margin-bottom: 2rem;
            letter-spacing: -0.5px;
        }

        .links-grid {
            display: grid;
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 18px;
            text-decoration: none;
            color: var(--text-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            display: block;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
        }

        .card h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.4rem;
            color: var(--primary-color);
        }

        .card p {
            margin: 0;
            font-size: 0.95rem;
            opacity: 0.7;
        }

        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>My Projects</h1>
        
        <div class="links-grid">
            <a href="https://lakizoli.github.io/vocabinder/" class="card">
                <h2>VocaBinder</h2>
                <p>Managed dictionary and language learning exercise book.</p>
            </a>

            <a href="https://lakizoli.github.io/trabi/" class="card">
                <h2>Trabi</h2>
                <p>Explore the Trabi project and its features.</p>
            </a>
        </div>

        <footer>
            &copy; 2024 ZSoft. Hosted on GitHub Pages.
        </footer>
    </div>

</body>
</html>
